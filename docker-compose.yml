version: '3.8'
services:
  control_db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  control_backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@control_db:5432/postgres
    ports:
      - "8000:8000"
    networks:
      - frontend_net
      - backend_net
    depends_on:
      control_db:
        condition: service_healthy

  control_frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - frontend_net

volumes:
  db_data:

networks:
  frontend_net:
  backend_net:
