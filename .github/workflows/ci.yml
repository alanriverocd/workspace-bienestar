name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests (inside docker)
        run: bash ./scripts/test.sh

  e2e:
    name: E2E (Playwright)
    needs: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do pg_isready -h localhost -p 5432 -U postgres && break || sleep 1; done

      - name: Apply Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
        run: |
          cd backend
          python apply_migrations.py

      - name: Start backend (uvicorn)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
        run: |
          cd backend
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          sleep 4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps & Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps

      - name: Start frontend preview and run Playwright tests
        env:
          BASE_URL: http://127.0.0.1:5173
        run: |
          cd frontend
          npm run preview -- --port 5173 --host > /tmp/preview.log 2>&1 &
          PREV_PID=$!
            # esperar hasta 60s a que el frontend responda
            for i in $(seq 1 12); do
              if curl -sS http://127.0.0.1:5173 >/dev/null 2>&1; then
                echo "preview listo"
                break
              fi
              echo "esperando preview... intento $i/12"
              sleep 5
            done
          npx playwright test --config=playwright.config.js --project=chromium --reporter=github
          kill ${PREV_PID} || true
      - name: Prepare artifacts for upload
        if: always()
        run: |
          cd frontend || true
          mkdir -p test-results || true
          touch test-results/.keep || true
          ls -la test-results || true
          ls -la /tmp/preview.log /tmp/backend.log || true

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            frontend/test-results
            /tmp/preview.log
            /tmp/backend.log
